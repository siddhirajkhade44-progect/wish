<!DOCTYPE html>
<html>
<head>
<title>Holi Wish</title>

<style>
body{
text-align:center;
font-family:Arial;
background:linear-gradient(90deg,#ff4d4d,#ffcc00,#33cc33,#3399ff,#cc33ff);
color:white;
}

h1{
margin-top:80px;
font-size:45px;
}

.message{
margin:40px;
font-size:24px;
line-height:40px;
}
</style>

</head>

<body>

<h1 id="wish"></h1>

<div class="message">

<p>May your life be filled with</p>

<p>🌈 Colors of Happiness</p>

<p>💖 Colors of Love</p>

<p>😊 Colors of Joy</p>

<p>Wishing You and Your Family</p>

<p><b>A Very Happy Holi!</b></p>

</div>

<script>

var name = localStorage.getItem("holiname");

document.getElementById("wish").innerHTML = "Happy Holi " + name + " 🌈";

</script>

</body>
</html>
